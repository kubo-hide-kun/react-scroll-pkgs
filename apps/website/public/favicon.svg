<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="react-scroll-pkgs">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7ed4fd"/>
      <stop offset="0.5" stop-color="#709df7"/>
      <stop offset="1" stop-color="#4d78ef"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#05060a"/>
  <!-- scroll track -->
  <rect x="27" y="12" width="10" height="40" rx="5" fill="rgba(255,255,255,0.08)"/>
  <!-- scroll thumb (progress) -->
  <rect x="27" y="12" width="10" height="22" rx="5" fill="url(#brand)"/>
  <!-- scroll-down chevrons -->
  <path d="M22 42 l10 8 l10 -8" fill="none" stroke="url(#brand)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
